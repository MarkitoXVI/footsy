services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: footsy-app
    container_name: footsy-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/vendor
    networks:
      - footsy

  db:
    image: mysql:8.0
    container_name: footsy-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    networks:
      - footsy

  nginx:
    image: nginx:alpine
    container_name: footsy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - /var/www/vendor
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - footsy

networks:
  footsy:
    driver: bridge
